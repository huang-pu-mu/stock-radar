<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="雷達之星" />
  <title>雷達之星</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <p class="eyebrow">每日股票觀察</p>
        <h1>雷達之星</h1>
        <p class="subtitle">用大字卡片顯示籌碼強弱，先看重點，再看明細。</p>
      </div>
      <div class="header-actions">
        <button id="authMiniCard" class="auth-mini-card" type="button">登入</button>
        <button id="installBtn" class="install-btn hidden" type="button">安裝 APP</button>
      </div>
    </header>

    <div class="app-main-layout">
      <aside class="desktop-sidebar" aria-label="主要功能列">
        <div class="side-nav-card">
          <div class="side-nav-title">
            <span class="side-nav-logo">✦</span>
            <div>
              <strong>功能選單</strong>
              <small>V1.4 UI 優化</small>
            </div>
          </div>

          <div class="side-nav-scroll">
            <section class="side-nav-group" aria-label="市場雷達">
              <p class="side-nav-group-title">市場雷達</p>
              <button class="tab-btn side-nav-btn active" type="button" data-page="radar"><span class="nav-icon">📡</span><span>今日雷達</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="foreign"><span class="nav-icon">🌐</span><span>外資排行</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="foreignStreak"><span class="nav-icon">📈</span><span>外資連買</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="trust"><span class="nav-icon">🏦</span><span>投信排行</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="syncBuy"><span class="nav-icon">🤝</span><span>法人同步</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="industryFlow"><span class="nav-icon">🏭</span><span>產業資金</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="majorHolder"><span class="nav-icon">🐋</span><span>主力籌碼</span></button>
            </section>

            <section class="side-nav-group" aria-label="個股與自選">
              <p class="side-nav-group-title">個股與自選</p>
              <button class="tab-btn side-nav-btn" type="button" data-page="search"><span class="nav-icon">🔎</span><span>個股查詢</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="watchlist"><span class="nav-icon">⭐</span><span>自選股</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="alerts"><span class="nav-icon">🔔</span><span>提醒</span><span class="alerts-tab-badge tab-count-badge hidden">0</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="notifications"><span class="nav-icon">📣</span><span>通知外送</span></button>
            </section>

            <section class="side-nav-group" aria-label="策略中心">
              <p class="side-nav-group-title">策略中心</p>
              <button class="tab-btn side-nav-btn" type="button" data-page="strategies"><span class="nav-icon">🧭</span><span>策略選股</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="strategyTracks"><span class="nav-icon">📌</span><span>策略追蹤</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="strategyOptimize"><span class="nav-icon">⚙️</span><span>策略最佳化</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="strategyBacktests"><span class="nav-icon">📊</span><span>策略回測</span></button>
              <button class="tab-btn side-nav-btn" type="button" data-page="strategyReports"><span class="nav-icon">🗞️</span><span>每日報告</span></button>
            </section>

            <section class="side-nav-group" aria-label="系統">
              <p class="side-nav-group-title">系統</p>
              <button class="tab-btn side-nav-btn" type="button" data-page="account"><span class="nav-icon">👤</span><span>我的</span></button>
            </section>
          </div>
        </div>
      </aside>

      <main class="content-shell">
        <section class="panel page-control-panel" aria-label="股票雷達功能區">
          <div class="section-title-row page-title-row">
            <div class="page-title-copy">
              <p class="section-kicker">目前頁面</p>
              <h2 id="pageTitle">今日雷達</h2>
              <p id="pageDesc">依籌碼分數排序，顯示全市場高分股</p>
              <div id="pageMetaBar" class="page-meta-bar" aria-label="頁面狀態摘要"></div>
            </div>
            <div class="page-action-stack">
              <button id="refreshBtn" class="ghost-btn" type="button">重新整理</button>
            </div>
          </div>

          <div id="contentFilterShell" class="content-filter-shell" aria-label="篩選與操作">
            <div class="content-filter-header">
              <div>
                <p class="section-kicker">篩選列</p>
                <h3 id="contentFilterTitle">篩選與操作</h3>
                <p id="contentFilterDesc">切換市場或功能後，下方清單會自動更新。</p>
              </div>
            </div>

            <nav id="mobileSectionNav" class="mobile-section-nav" aria-label="頁內次功能切換">
          <div class="mobile-subnav-group" data-mobile-subnav-group="market">
            <button class="tab-btn mobile-subnav-btn active" type="button" data-page="radar">今日</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="foreign">外資</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="foreignStreak">連買</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="trust">投信</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="syncBuy">同步</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="industryFlow">產業</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="majorHolder">主力</button>
          </div>
          <div class="mobile-subnav-group hidden" data-mobile-subnav-group="personal">
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="search">查詢</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="watchlist">自選</button>
          </div>
          <div class="mobile-subnav-group hidden" data-mobile-subnav-group="strategy">
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="strategies">選股</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="strategyTracks">追蹤</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="strategyOptimize">最佳化</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="strategyBacktests">回測</button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="strategyReports">報告</button>
          </div>
          <div class="mobile-subnav-group hidden" data-mobile-subnav-group="alerts">
            <button class="tab-btn mobile-subnav-btn alert-tab-btn" type="button" data-page="alerts">提醒 <span class="alerts-tab-badge tab-count-badge hidden">0</span></button>
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="notifications">外送</button>
          </div>
          <div class="mobile-subnav-group hidden" data-mobile-subnav-group="account">
            <button class="tab-btn mobile-subnav-btn" type="button" data-page="account">我的</button>
          </div>
        </nav>

        <form id="searchPanel" class="search-panel hidden" aria-label="個股查詢" novalidate>
          <label class="search-label" for="stockSearchInput">輸入股票代號</label>
          <div class="search-row">
            <input
              id="stockSearchInput"
              class="search-input"
              type="text"
              inputmode="text"
              autocomplete="off"
              placeholder="例如：2330"
              aria-describedby="searchHelp"
            />
            <button id="stockSearchBtn" class="search-btn" type="submit">查詢</button>
          </div>
          <p id="searchHelp" class="search-help">輸入股票代號後按查詢，例如 2330、2317、0050。</p>
          <div id="recentSearches" class="recent-searches" aria-label="最近查詢"></div>
        </form>

        <div id="marketRow" class="market-row" aria-label="市場切換">
          <button class="market-btn active" type="button" data-market="">全部</button>
          <button class="market-btn" type="button" data-market="上市">上市</button>
          <button class="market-btn" type="button" data-market="上櫃">上櫃</button>
        </div>

          <div id="helpCard" class="help-card" aria-label="使用說明">
            <strong>簡單看法：</strong>
            <span>分數越高代表籌碼越強；點「看明細」可以查看外資、投信、成交量。</span>
          </div>
        </div>
      </section>

        <section id="contentSummaryBar" class="content-summary-bar hidden" aria-label="統計摘要"></section>
        <section id="resultHeader" class="result-header-card hidden" aria-label="清單摘要"></section>
        <section id="statusBox" class="status-box hidden"></section>
        <section id="stockList" class="stock-list" aria-label="股票列表"></section>
      </main>
    </div>
  </div>

  <nav class="mobile-bottom-nav" aria-label="手機主導航">
    <button class="tab-btn mobile-bottom-btn active" type="button" data-page="radar" data-mobile-nav-group="market">
      <span class="mobile-bottom-icon">📡</span>
      <span>雷達</span>
    </button>
    <button class="tab-btn mobile-bottom-btn" type="button" data-page="search" data-mobile-nav-group="personal">
      <span class="mobile-bottom-icon">⭐</span>
      <span>個股</span>
    </button>
    <button class="tab-btn mobile-bottom-btn" type="button" data-page="strategies" data-mobile-nav-group="strategy">
      <span class="mobile-bottom-icon">🧭</span>
      <span>策略</span>
    </button>
    <button class="tab-btn mobile-bottom-btn alert-tab-btn" type="button" data-page="alerts" data-mobile-nav-group="alerts">
      <span class="mobile-bottom-icon">🔔</span>
      <span>提醒</span>
      <span class="alerts-tab-badge tab-count-badge hidden">0</span>
    </button>
    <button class="tab-btn mobile-bottom-btn" type="button" data-page="account" data-mobile-nav-group="account">
      <span class="mobile-bottom-icon">👤</span>
      <span>我的</span>
    </button>
  </nav>

  <button id="backToTopBtn" class="back-to-top-btn hidden" type="button" aria-label="回到頁面頂部" title="回到頂部">
    <span class="back-to-top-icon">↑</span>
    <span class="back-to-top-text">TOP</span>
  </button>

  <div id="detailModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <div>
          <p class="eyebrow">股票明細</p>
          <h2 id="detailTitle">載入中</h2>
        </div>
        <button id="closeDetailBtn" class="close-btn" type="button" aria-label="關閉">×</button>
      </div>
      <div id="detailContent" class="detail-content"></div>
    </div>
  </div>

  <div id="chartZoomModal" class="chart-zoom-modal hidden" aria-hidden="true">
    <div class="chart-zoom-backdrop" data-chart-zoom-close="true"></div>
    <div class="chart-zoom-card" role="dialog" aria-modal="true" aria-labelledby="chartZoomTitle">
      <div class="chart-zoom-header">
        <div>
          <p class="eyebrow">放大圖表</p>
          <h2 id="chartZoomTitle">技術圖表</h2>
          <p class="chart-zoom-subtitle">可切換區間，並左右拖曳查看前後 K 線。</p>
        </div>
        <button id="closeChartZoomBtn" class="close-btn" type="button" aria-label="關閉放大圖表">×</button>
      </div>
      <div id="chartZoomContent" class="chart-zoom-content"></div>
    </div>
  </div>


  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
